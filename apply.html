<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Application</title>
<style>
body {
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background: url('https://images.unsplash.com/photo-1564869733908-b4603edcda8a?auto=format&fit=crop&w=1740&q=80') no-repeat center center fixed;
    background-size: cover;
    color:white;
    position: relative;
}

.overlay {
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.6);
    z-index:1;
}

.container {
    position: relative;
    z-index:2;
    max-width: 600px;
    margin: 80px auto;
    padding: 20px;
    background: rgba(255,255,255,0.1);
    border-radius: 15px;
    backdrop-filter: blur(10px);
}

/* Form Styles */
form input, form select, form textarea {
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid rgba(255,255,255,0.5);
    background: rgba(255,255,255,0.1);
    color:white;
    font-size:16px;
    outline:none;
    transition:0.3s;
}

form input::placeholder, form textarea::placeholder {
    color: rgba(255,255,255,0.7);
}

form input:focus, form select:focus, form textarea:focus {
    border:2px solid #4f7cff;
    background: rgba(255,255,255,0.15);
}

button.submit-btn {
    width:100%;
    padding:14px;
    margin-top:10px;
    border-radius:10px;
    border:2px solid #4f7cff;
    background: rgba(255,255,255,0);
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button.submit-btn:hover {
    background: rgba(79,124,255,0.2);
    transform: scale(1.05);
    box-shadow: 0 4px 15px rgba(79,124,255,0.4);
}

/* Back Button */
.back-btn {
    width: 120px;
    padding: 12px 18px;
    background: rgba(255,255,255,0);
    color: white;
    border: 2px solid #4f7cff;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-bottom: 20px;
}

.back-btn:hover {
    background: rgba(79,124,255,0.2);
    transform: scale(1.05);
    box-shadow: 0 4px 15px rgba(79,124,255,0.4);
}
</style>
</head>
<body>

<div class="overlay"></div>

<div class="container">

    <a href="jobs.html"><button class="back-btn">Back</button></a>

    <h2>Job Application</h2>
    <form id="applicationForm">
        <input type="text" id="studentName" placeholder="Full Name" required>
        <input type="email" id="studentEmail" placeholder="Email" required>
        <input type="text" id="studentContact" placeholder="Contact Number" required>
        <input type="text" id="studentCollege" placeholder="College Name" required>
        <input type="text" id="jobTitle" placeholder="Job Title" readonly>
        <input type="text" id="companyName" placeholder="Company Name" readonly>
        <textarea id="coverLetter" placeholder="Cover Letter / Message" rows="5"></textarea>
        <button type="submit" class="submit-btn">Submit Application</button>
    </form>

</div>

<script>
// Read job title and company from URL query params
window.onload = function() {
    const params = new URLSearchParams(window.location.search);
    const job = params.get('job');
    const company = params.get('company');

    if(job) document.getElementById('jobTitle').value = job;
    if(company) document.getElementById('companyName').value = company;
}

// Form submit
document.getElementById('applicationForm').addEventListener('submit', function(e){
    e.preventDefault();
    alert("Application Submitted!\nJob: " + document.getElementById('jobTitle').value + 
          "\nCompany: " + document.getElementById('companyName').value);
    this.reset();
    window.location.href = "jobs.html";
});
</script>

</body>
</html>
