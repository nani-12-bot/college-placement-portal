<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Company Login</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: url('https://images.unsplash.com/photo-1497366754035-f200968a6e72') no-repeat center/cover;
        color: white;
    }

    .header {
        text-align: center;
        padding: 20px;
        background: rgba(0,0,0,0.7);
        font-size: 32px;
        font-weight: bold;
    }

    .form-container {
        width: 400px;
        margin: 60px auto;
        padding: 25px;
        background: rgba(0,0,0,0.65);
        border-radius: 12px;
        border: 1px solid #444;
    }

    .form-container h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    input {
        width: 100%;
        padding: 12px;
        margin-top: 14px;
        border: none;
        border-radius: 6px;
        font-size: 16px;
    }

    .btn {
        width: 100%;
        padding: 12px;
        margin-top: 20px;
        border: none;
        background: #ff7b00;
        color: white;
        font-size: 18px;
        border-radius: 6px;
        cursor: pointer;
    }

    .btn:hover {
        background: #dd6800;
    }

    .back-btn {
        position: fixed;
        bottom: 20px;
        left: 20px;
        background: black;
        color: white;
        padding: 10px 16px;
        border-radius: 8px;
        text-decoration: none;
        font-weight: bold;
    }
</style>

</head>
<body>

<div class="header">Company Login</div>

<div class="form-container">
    <h2>Login</h2>

    <form action="#">
        <input type="email" placeholder="Company Email" required>
        <input type="password" placeholder="Password" required>
        <button class="btn">Login</button>
    </form>
</div>

<a href="index.html" class="back-btn">⬅ Back</a>

</body>
</html>
