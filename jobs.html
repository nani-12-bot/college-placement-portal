<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Job Search</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        background: #f2f2f2;
    }

    header {
        background: #004aad;
        padding: 20px;
        text-align: center;
        color: white;
        font-size: 28px;
        font-weight: bold;
    }

    /* BACK BUTTON */
    .back-btn {
        position: fixed;
        bottom: 20px;
        left: 20px;
        padding: 12px 18px;
        background: transparent;
        border: 2px solid #004aad;
        color: #004aad;
        font-size: 16px;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.3s;
        z-index: 999;
    }

    .back-btn:hover {
        background: #004aad;
        color: white;
    }

    /* FILTER BAR (Dark Grey) */
    .filters {
        background: #2b2b2b;
        padding: 20px;
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
        justify-content: center;
    }

    .filters input,
    .filters select {
        padding: 12px;
        width: 220px;
        border: none;
        border-radius: 6px;
        background: #3a3a3a;
        color: white;
        font-size: 15px;
    }

    /* JOB LIST */
    .job-list {
        width: 90%;
        margin: 30px auto;
    }

    .job-card {
        background: white;
        padding: 20px;
        border-radius: 10px;
        margin-bottom: 20px;
        border-left: 5px solid #004aad;
        box-shadow: 0 3px 6px rgba(0,0,0,0.15);
    }

    .job-card h3 {
        margin: 0;
        color: #004aad;
        font-size: 22px;
    }

    .job-details {
        margin: 8px 0;
        color: #333;
        font-size: 16px;
    }

    .apply-btn {
        padding: 10px 18px;
        background: #004aad;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 15px;
        margin-top: 10px;
    }

    .apply-btn:hover {
        background: #003b88;
    }
</style>
</head>

<body>

<!-- BACK BUTTON -->
<button class="back-btn" onclick="window.location.href='index.html'">⬅ Back</button>

<header>Job Search Portal</header>

<!-- FILTER BAR -->
<div class="filters">
    <input type="text" id="searchInput" placeholder="Search Job Title...">
    
    <select id="locationFilter">
        <option value="">All Locations</option>
    </select>

    <select id="salaryFilter">
        <option value="">Salary Range</option>
        <option value="20000">Below ₹20,000</option>
        <option value="30000">Below ₹30,000</option>
        <option value="50000">Below ₹50,000</option>
        <option value="70000">Below ₹70,000</option>
    </select>

    <select id="typeFilter">
        <option value="">Job Type</option>
        <option value="Full-Time">Full-Time</option>
        <option value="Part-Time">Part-Time</option>
        <option value="Internship">Internship</option>
    </select>
</div>

<!-- JOB LIST -->
<div class="job-list" id="jobList"></div>

<script>
    const jobs = [
        { title: "Software Developer", salary: 50000, type: "Full-Time", locations: ["Hyderabad", "Warangal", "Bangalore"] },
        { title: "Data Analyst", salary: 35000, type: "Full-Time", locations: ["Hyderabad", "Mumbai"] },
        { title: "Frontend Developer", salary: 30000, type: "Internship", locations: ["Karimnagar", "Bangalore"] },
        { title: "Network Engineer", salary: 40000, type: "Full-Time", locations: ["Hyderabad", "Nizamabad"] },
        { title: "Embedded Engineer", salary: 45000, type: "Full-Time", locations: ["Warangal", "Mumbai"] },
        { title: "Electrical Technician", salary: 25000, type: "Full-Time", locations: ["Hyderabad", "Karimnagar"] },
        { title: "Mechanical Design Engineer", salary: 38000, type: "Full-Time", locations: ["Bangalore", "Mumbai"] },
        { title: "Civil Site Engineer", salary: 30000, type: "Full-Time", locations: ["Hyderabad", "Warangal"] },
        { title: "HR Manager", salary: 55000, type: "Full-Time", locations: ["Mumbai", "Bangalore"] }
    ];

    const jobList = document.getElementById("jobList");
    const locationFilter = document.getElementById("locationFilter");

    // Load all locations dynamically
    function loadLocations() {
        const setLoc = new Set();
        jobs.forEach(j => j.locations.forEach(l => setLoc.add(l)));

        setLoc.forEach(loc => {
            const opt = document.createElement("option");
            opt.value = loc;
            opt.textContent = loc;
            locationFilter.appendChild(opt);
        });
    }

    function displayJobs() {
        const search = document.getElementById("searchInput").value.toLowerCase();
        const loc = locationFilter.value;
        const salary = document.getElementById("salaryFilter").value;
        const type = document.getElementById("typeFilter").value;

        jobList.innerHTML = "";

        jobs
            .filter(j =>
                j.title.toLowerCase().includes(search) &&
                (loc === "" || j.locations.includes(loc)) &&
                (salary === "" || j.salary <= salary) &&
                (type === "" || j.type === type)
            )
            .forEach(job => {
                const card = document.createElement("div");
                card.className = "job-card";

                card.innerHTML = `
                    <h3>${job.title}</h3>
                    <p class="job-details">Salary: ₹${job.salary}</p>
                    <p class="job-details">Type: ${job.type}</p>
                    <p class="job-details">Locations: ${job.locations.join(", ")}</p>
                    <button class="apply-btn" onclick="window.location.href='apply.html'">Apply Now</button>
                `;

                jobList.appendChild(card);
            });
    }

    document.querySelectorAll("input,select").forEach(el => {
        el.addEventListener("input", displayJobs);
        el.addEventListener("change", displayJobs);
    });

    loadLocations();
    displayJobs();
</script>

</body>
</html>
