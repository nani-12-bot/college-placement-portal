<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Profile</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: url('https://images.unsplash.com/photo-1531497865144-0464ef8fb9a9?auto=format&fit=crop&w=1740&q=80') 
        no-repeat center center fixed;
    background-size: cover;
    color: white;
}

/* Overlay for effect */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.55);
    top: 0;
    left: 0;
    z-index: 1;
}

/* Page container */
.container {
    position: relative;
    z-index: 2;
    max-width: 900px;
    margin: 80px auto;
    padding: 20px;
}

/* Heading */
h2 {
    text-align: center;
    margin-bottom: 30px;
    font-size: 32px;
    text-transform: uppercase;
}

/* Profile box */
.profile-box {
    background: rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 25px;
    backdrop-filter: blur(6px);
    box-shadow: 0 4px 20px rgba(255,255,255,0.2);
}

/* Profile Info */
.info {
    font-size: 18px;
    padding: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.2);
}

.info span {
    font-weight: bold;
    color: #c9e4ff;
}

/* Resume link */
.resume-link {
    color: #00eaff;
    text-decoration: none;
}

.resume-link:hover {
    text-decoration: underline;
}

/* Back Button */
.back-btn {
    margin-top: 25px;
    padding: 12px 22px;
    background: transparent;
    color: white;
    border: 2px solid white;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

.back-btn:hover {
    background: rgba(255,255,255,0.2);
    transform: scale(1.05);
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="container">
    <h2>Student Profile</h2>

    <div class="profile-box">
        <div class="info"><span>Name:</span> John Doe</div>
        <div class="info"><span>Email:</span> johndoe@gmail.com</div>
        <div class="info"><span>Branch:</span> Computer Science</div>
        <div class="info"><span>Year of Passing:</span> 2025</div>
        <div class="info"><span>Preferred Location:</span> Hyderabad, Bangalore</div>
        <div class="info"><span>Resume:</span> 
            <a class="resume-link" href="#" target="_blank">View Resume</a>
        </div>
    </div>

    <a href="student_login.html">
        <button class="back-btn">Back</button>
    </a>
</div>

</body>
</html>
